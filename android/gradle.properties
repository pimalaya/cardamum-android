org.gradle.jvmargs=-Xmx2048m
org.gradle.caching=true

# The UI uses framework Views only, so the FOSS build pulls no AndroidX
# and stays smallest. The flag is enabled only because the googleRelease
# build's Play Billing dependency transitively needs AndroidX; it adds
# nothing to the FOSS build, which depends on no AndroidX artifact.
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official
