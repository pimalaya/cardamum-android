# Cardamum JNI bridge: a cdylib driving pimconf discovery and io-webdav
# CardDAV coroutines for the Android :client module. Scoped to the
# client; the :app module never depends on it.

[package]
name = "cardamum"
description = "JNI bridge driving pimconf and io-webdav coroutines for the Cardamum Android client"
version = "0.1.0"
edition = "2024"
rust-version = "1.87"
license = "MIT OR Apache-2.0"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
io-http = { version = "0.1", default-features = false }
io-msgraph = { version = "0.0.1", default-features = false }
io-oauth = { version = "0.0.4", default-features = false }
io-webdav = { version = "0.0.1", default-features = false }
jni = "0.22"
pimconf = { version = "0.1", default-features = false, features = ["search"] }
serde = { version = "1", default-features = false, features = ["alloc", "derive"] }
serde_json = { version = "1", default-features = false, features = ["alloc"] }
url = { version = "2", default-features = false }
vcard-rs = { version = "0.0.1", default-features = false, features = ["parser"] }

# The Pimalaya crates live in sibling repos and are wired locally (they
# resolve via git, not crates.io); patch them to the checkouts next door.
[patch.crates-io]
io-http = { path = "../../io-http" }
io-msgraph = { path = "../../io-msgraph" }
io-oauth = { path = "../../io-oauth" }
io-webdav = { path = "../../io-webdav" }
pimconf = { path = "../../pimconf" }
vcard-rs = { path = "../../vcard-rs" }
