[package]
name = "cardamum"
description = "JNI bridge driving Pimalaya I/O-free coroutines for the Cardamum Android client"
version = "0.1.0"
edition = "2024"
rust-version = "1.87"
license = "MIT OR Apache-2.0"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
calcard = "0.3"
io-google-people = { version = "0.0.1", default-features = false }
io-http = { version = "0.1", default-features = false }
io-jmap = { version = "0.1", default-features = false }
io-msgraph = { version = "0.0.1", default-features = false }
io-oauth = { version = "0.0.4", default-features = false }
io-offline = { version = "0.1", default-features = false }
io-webdav = { version = "0.0.1", default-features = false }
jni = "0.22"
pimconf = { version = "0.1", default-features = false, features = ["search"] }
secrecy = { version = "0.10", default-features = false }
serde = { version = "1", default-features = false, features = ["alloc", "derive"] }
serde_json = { version = "1", default-features = false, features = ["alloc"] }
url = { version = "2", default-features = false }
vcard-rs = { version = "0.0.1", default-features = false, features = ["parser"] }

[patch.crates-io]
io-google-people.git = "https://github.com/pimalaya/io-google-people"
io-http.git = "https://github.com/pimalaya/io-http"
io-jmap.git = "https://github.com/pimalaya/io-jmap"
io-msgraph.git = "https://github.com/pimalaya/io-msgraph"
io-oauth.git = "https://github.com/pimalaya/io-oauth"
io-offline.git = "https://github.com/pimalaya/io-offline"
io-webdav.git = "https://github.com/pimalaya/io-webdav"
pimconf.git = "https://github.com/pimalaya/pimconf"
vcard-rs.git = "https://github.com/pimalaya/vcard"
